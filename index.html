<!DOCTYPE html>
<html>
<head>
    <title>Spicy Bites Restaurant</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #fff8f0;
        }

        header {
            background: #d62828;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #f77f00;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 20px;
        }

        .menu-item {
            background: #ffe5b4;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }

        button {
            background: white;
            color: #d62828;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        form {
            background: #ffe5b4;
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
            display: none;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        table {
            width: 100%;
            background: white;
            margin-top: 10px;
        }

        footer {
            background: #003049;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>🍴 Spicy Bites</h1>
    <p>Delicious Food, Happy Mood!</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Contact</a>
</nav>

<section>
    <h2>Menu</h2>

    <div class="menu-item">🍕 Pizza - ₹200</div>
    <div class="menu-item">🍔 Burger - ₹150</div>
    <div class="menu-item">🥤 Juice - ₹80</div>
</section>

<section>
    <h2>Book Table</h2>

    <button onclick="toggleForm()">Book Table</button>

    <form id="bookingForm" onsubmit="saveBooking(event)">
        <h3>Reservation</h3>

        <input id="name" placeholder="Name" required>
        <input id="phone" placeholder="Phone" required>
        <input id="guests" type="number" placeholder="Guests" required>
        <input id="date" type="date" required>
        <input id="time" type="time" required>

        <select id="table" required>
            <option value="">Table Size</option>
            <option>2</option>
            <option>4</option>
            <option>6</option>
        </select>

        <!-- 💳 QR CODE (GPay) -->
        <h4>💳 Scan & Pay using GPay</h4>
        <img 
            src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourupiid@okaxis&pn=SpicyBites&am=100&cu=INR"
            style="border:2px solid #d62828; border-radius:10px;">

        <button type="submit">Confirm Booking</button>
    </form>
</section>

<section>
    <h2>Contact</h2>
    <p>📍 Chennai</p>
    <p>📞 9066940210</p>

    <button onclick="showAdmin()">Admin View</button>

    <h3 id="count"></h3>

    <div id="adminSection" style="display:none;">
        <table border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Guests</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Table</th>
                </tr>
            </thead>
            <tbody id="adminTable"></tbody>
        </table>
    </div>
</section>

<footer>
    © 2026 Spicy Bites
</footer>

<script>
function toggleForm() {
    let form = document.getElementById("bookingForm");
    form.style.display = (form.style.display === "block") ? "none" : "block";
}

function saveBooking(e) {
    e.preventDefault();

    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

    let newBooking = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        guests: document.getElementById("guests").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        table: document.getElementById("table").value
    };

    bookings.push(newBooking);
    localStorage.setItem("bookings", JSON.stringify(bookings));

    alert("Booking Saved Successfully!");
    document.getElementById("bookingForm").reset();
}

function showAdmin() {
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

    document.getElementById("adminSection").style.display = "block";

    document.getElementById("count").innerText =
        "Total Bookings: " + bookings.length;

    let table = document.getElementById("adminTable");
    table.innerHTML = "";

    if (bookings.length === 0) {
        table.innerHTML = "<tr><td colspan='6'>No Bookings Found</td></tr>";
        return;
    }

    bookings.forEach(b => {
        table.innerHTML += `
        <tr>
            <td>${b.name}</td>
            <td>${b.phone}</td>
            <td>${b.guests}</td>
            <td>${b.date}</td>
            <td>${b.time}</td>
            <td>${b.table}</td>
        </tr>`;
    });
}
</script>

</body>
</html>
