<!DOCTYPE html>
<html>
<head>
    <title>Spicy Bites 🍽️</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #fff;
        }

        /* FULL SCREEN LOCK SCREEN */
        #landing {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            text-align: center;
        }

        #landing h1 {
            font-size: 42px;
        }

        #landing p {
            margin: 10px 0 20px;
        }

        #landing button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            background: white;
            color: #ff416c;
            font-weight: bold;
        }

        /* MAIN PAGE (hidden first) */
        #main {
            display: none;
            padding: 15px;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #ff416c;
            color: white;
            border-radius: 10px;
        }

        .menu {
            margin-top: 20px;
        }

        .item {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        button {
            background: linear-gradient(90deg, #ff512f, #dd2476);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        form {
            display: none;
            margin-top: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th {
            background: #ff416c;
            color: white;
            padding: 8px;
        }

        td {
            padding: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- LANDING SCREEN -->
<div id="landing">
    <h1>🍽️ Spicy Bites</h1>
    <p>Delicious Food • Fresh Taste</p>
    <button onclick="enterSite()">Enter</button>
</div>

<!-- MAIN SITE -->
<div id="main">

<header>
    <h2>🍽️ Spicy Bites Menu</h2>
</header>

<div class="menu">
    <div class="item">🍕 Pizza - ₹200</div>
    <div class="item">🍔 Burger - ₹150</div>
    <div class="item">🥤 Juice - ₹80</div>
</div>

<button onclick="toggleForm()">Book Table</button>

<form id="form" onsubmit="saveBooking(event)">
    <input id="name" placeholder="Name" required>
    <input id="phone" placeholder="Phone" required>
    <input id="guests" type="number" placeholder="Guests" required>
    <input id="date" type="date" required>
    <input id="time" type="time" required>

    <select id="table" required>
        <option value="">Table Size</option>
        <option>2</option>
        <option>4</option>
        <option>6</option>
    </select>

    <button type="submit">Confirm</button>
</form>

<button onclick="showAdmin()">Admin View</button>

<h3 id="count"></h3>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Guests</th>
            <th>Date</th>
            <th>Time</th>
            <th>Table</th>
        </tr>
    </thead>
    <tbody id="tableData"></tbody>
</table>

</div>

<script>
function enterSite() {
    document.getElementById("landing").style.display = "none";
    document.getElementById("main").style.display = "block";
}

function toggleForm() {
    let f = document.getElementById("form");
    f.style.display = (f.style.display === "block") ? "none" : "block";
}

function saveBooking(e) {
    e.preventDefault();

    let data = JSON.parse(localStorage.getItem("bookings")) || [];

    data.push({
        name: name.value,
        phone: phone.value,
        guests: guests.value,
        date: date.value,
        time: time.value,
        table: table.value
    });

    localStorage.setItem("bookings", JSON.stringify(data));

    alert("Booked Successfully!");
    form.reset();
}

function showAdmin() {
    let data = JSON.parse(localStorage.getItem("bookings")) || [];

    document.getElementById("count").innerText =
        "Total Bookings: " + data.length;

    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach(b => {
        table.innerHTML += `
        <tr>
            <td>${b.name}</td>
            <td>${b.phone}</td>
            <td>${b.guests}</td>
            <td>${b.date}</td>
            <td>${b.time}</td>
            <td>${b.table}</td>
        </tr>`;
    });
}
</script>

</body>
</html>
